<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel = "stylesheet" href = "style.css">
  <title>Coffee Website</title>
  <!-- linking font awesome for icons -->
  <link rel="stylesheet" href ="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
  <!-- header / navbar -->
  <header>
    <nav class = "navbar section-content">
      <a href = "#" class ="nav-logo">
      <h2 class ="logo-text">☕ Coffee</h2>
      </a>
      
      <ul class = "Nav-menu">
        <button id ="menu-close-button" class ="fas fa-times"></button>

        <li class ="nav-item">
        <a  href = "#" class="Nav-link">Home</a>
        </li>
      
        <li class = "Nav-item">
        <a href ="#" class="Nav-link">About</a>
        </li>
      
      <li class = "Nav-item">
        <a href ="#" class="Nav-link">Menu</a>
        </li>
      
      <li class = "Nav-item">
        <a href = "#" class="Nav-link">Testimonials</a>
        </li>
      
      <li class = "Nav-item">
        <a href = "#" class="Nav-link">Gallery</a>
      </li>
      
      <li class = "Nav-item">
        <a href = "#" class="Nav-link">Contact</a>
        </li>
      </ul>

      <button id ="menu-open-button" class ="fas fa-bars"></button>

    </nav>
  </header>


  <main>
  <section class = "Hero-section">
    <div class="Section-content">
      <div class="Hero-details">
        <h2 class="Title">Best coffee</h2>
        <h3 class = "subtitle">Make your day great with our special coffee!</h3>
        <p class="description">Welcome to our coffee paradise, where every bean tells a story and every cup sparks a joy.</p>

      <div class ="buttons">
        <a href ="#" class ="button order-now">Order now</a>
        <a href ="#" class = "button contact-us">Contact us</a>
      </div>
    </div>

      <div class="hero-image-wrapper">
        <img src ="image/coffee-hero-section.png" alt ="Hero" class ="hero-image">
      </div>
    </div>
  </section>
  </main>

  <script src ="script.js"></script>
</body>
</html>
